            '<div class="hp-faq-a"><p>We ask for at least 48 hours notice for cancellations or reschedules. Weather-related cancellations are rescheduled at no charge. We know shoots get moved &mdash; it happens.</p></div>' +
          '</div>' +

          '<div class="hp-faq-item">' +
            '<div class="hp-faq-q">Can I choose which horse I get?<span class="hp-faq-icon">+</span></div>' +
            '<div class="hp-faq-a"><p>Yes &mdash; if you have a preference for a specific Clydesdale or pony based on size, color, or temperament, tell us when you book. We&rsquo;ll match the animal to your project.</p></div>' +
          '</div>' +

          '<div class="hp-faq-item">' +
            '<div class="hp-faq-q">Do you provide grooming and styling?<span class="hp-faq-icon">+</span></div>' +
            '<div class="hp-faq-a"><p>Every horse arrives groomed and camera-ready. If you need specific styling &mdash; flower crowns, ribbons, seasonal decorations, branded accessories &mdash; let us know and we&rsquo;ll prep accordingly. Basic grooming is included; custom styling may be an add-on depending on the request.</p></div>' +
          '</div>' +

        '</div>' +
      '</section>' +

      /* -- PRICING -- */
      '<section class="hp-pricing">' +
        '<h2>Rental pricing.</h2>' +
        '<p class="hp-pricing-sub">Flat rates for standard bookings. Travel fees may apply outside our core service area.</p>' +
        '<div class="hp-pricing-grid">' +

          '<div class="hp-price-card">' +
            '<p class="hp-price-label">Single Horse</p>' +
            '<p class="hp-price-amount">$250</p>' +
            '<p class="hp-price-duration">Starting at &mdash; Up to 2 hours</p>' +
            '<p class="hp-price-desc">One Clydesdale or pony with handler. Includes transport, setup, and animal management for the full session. Ponies available at the same rate.</p>' +
            '<a href="/contact" class="hp-price-link">Get a Quote</a>' +
          '</div>' +

          '<div class="hp-price-card">' +
            '<p class="hp-price-label">Half Day</p>' +
            '<p class="hp-price-amount">$450</p>' +
            '<p class="hp-price-duration">Starting at &mdash; Up to 4 hours</p>' +
            '<p class="hp-price-desc">Maximum standard booking. Works for multi-location shoots, extended productions, or sessions that need more time with the animal. Includes handler for the full duration.</p>' +
            '<a href="/contact" class="hp-price-link">Get a Quote</a>' +
          '</div>' +

          '<div class="hp-price-card">' +
            '<p class="hp-price-label">Custom / Multi-Day</p>' +
            '<p class="hp-price-amount">Custom</p>' +
            '<p class="hp-price-duration">4+ hours or multiple days</p>' +
            '<p class="hp-price-desc">Beyond 4 hours, multi-day projects, or bookings requiring multiple animals. Email us with your project details and we&rsquo;ll build a quote.</p>' +
            '<a href="/contact" class="hp-price-link">Get a Quote</a>' +
          '</div>' +

        '</div>' +
        '<p class="hp-pricing-note">Final pricing depends on location, number of animals, and project scope. Travel fees apply outside Athol, Hayden, Coeur d&rsquo;Alene, Post Falls, Rathdrum, and Spokane. No surprise fees on the day of the shoot.</p>' +
      '</section>' +

      /* -- CTA -- */
      '<section class="hp-cta">' +
        '<h2>Tell us about your project.</h2>' +
        '<p>Share your shoot date, location, and what you need. We&rsquo;ll let you know if we&rsquo;re available and get you a quote within one business day.</p>' +
        '<div class="hp-cta-buttons">' +
          '<a href="/contact" class="hp-btn-dark">Tell Us About Your Project</a>' +
          '<a href="tel:+12082612092" class="hp-btn-outline">Call (208) 261-2092</a>' +
        '</div>' +
      '</section>';

    var hero = wrap.querySelector('.hp-hero');
    if (hero) hero.style.backgroundImage = "url('" + HERO + "')";

    page.insertBefore(wrap, page.firstChild);

    /* -- Force heading colors -- */
    wrap.querySelectorAll('h1, h2').forEach(function(el) {
      var onDark = el.closest('.hp-hero, .hp-pricing, .hp-faq');
      el.style.setProperty('color', onDark ? '#F3EDE3' : '#2C2520', 'important');
      el.style.setProperty('font-family', "'Cormorant Garamond', serif", 'important');
      el.style.setProperty('font-weight', '400', 'important');
    });

    wrap.querySelector('.hp-hero-eyebrow').style.setProperty('color', '#D4A843', 'important');
    wrap.querySelector('.hp-hero-sub').style.setProperty('color', 'rgba(243,237,227,0.92)', 'important');
    wrap.querySelector('.hp-intro p').style.setProperty('color', '#8A7868', 'important');
    wrap.querySelectorAll('.hp-use-num').forEach(function(el) { el.style.setProperty('color', 'rgba(212,168,67,0.25)', 'important'); });
    wrap.querySelectorAll('.hp-use-title').forEach(function(el) { el.style.setProperty('color', '#2C2520', 'important'); });
    wrap.querySelectorAll('.hp-use-text').forEach(function(el) { el.style.setProperty('color', '#8A7868', 'important'); });
    wrap.querySelectorAll('.hp-testi-quote').forEach(function(el) { el.style.setProperty('color', '#2C2520', 'important'); });
    wrap.querySelectorAll('.hp-testi-attr').forEach(function(el) { el.style.setProperty('color', '#8A7868', 'important'); });
    wrap.querySelectorAll('.hp-faq-q').forEach(function(el) { el.style.setProperty('color', '#F3EDE3', 'important'); });
    wrap.querySelectorAll('.hp-faq-a p').forEach(function(el) { el.style.setProperty('color', 'rgba(243,237,227,0.60)', 'important'); });
    wrap.querySelector('.hp-pricing-sub').style.setProperty('color', 'rgba(243,237,227,0.55)', 'important');
    wrap.querySelectorAll('.hp-price-label').forEach(function(el) { el.style.setProperty('color', '#D4A843', 'important'); });
    wrap.querySelectorAll('.hp-price-amount').forEach(function(el) { el.style.setProperty('color', '#F3EDE3', 'important'); });
    wrap.querySelectorAll('.hp-price-duration').forEach(function(el) { el.style.setProperty('color', 'rgba(243,237,227,0.45)', 'important'); });
    wrap.querySelectorAll('.hp-price-desc').forEach(function(el) { el.style.setProperty('color', 'rgba(243,237,227,0.55)', 'important'); });
    wrap.querySelector('.hp-pricing-note').style.setProperty('color', 'rgba(243,237,227,0.40)', 'important');
    wrap.querySelectorAll('.hp-stat-num').forEach(function(el) { el.style.setProperty('color', '#D4A843', 'important'); });
    wrap.querySelectorAll('.hp-stat-label').forEach(function(el) { el.style.setProperty('color', 'rgba(243,237,227,0.50)', 'important'); });
    wrap.querySelector('.hp-cta p').style.setProperty('color', '#8A7868', 'important');

    /* -- FAQ accordion -- */
    wrap.querySelectorAll('.hp-faq-item').forEach(function(item) {
      var q = item.querySelector('.hp-faq-q');
      var a = item.querySelector('.hp-faq-a');
      q.addEventListener('click', function() {
        var isOpen = a.style.maxHeight && a.style.maxHeight !== '0px';
        wrap.querySelectorAll('.hp-faq-a').forEach(function(el) { el.style.maxHeight = '0'; });
        wrap.querySelectorAll('.hp-faq-q').forEach(function(el) { el.classList.remove('open'); });
        if (!isOpen) {
          a.style.maxHeight = a.scrollHeight + 'px';
          q.classList.add('open');
        }
      });
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', buildHorseProps);
  } else {
    buildHorseProps();
  }
})();
</script>
