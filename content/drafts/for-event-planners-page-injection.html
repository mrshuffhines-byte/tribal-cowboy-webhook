          '<div class="ep-bring-card"><span class="ep-bring-num">01</span><p class="ep-bring-title">The Herd</p><p class="ep-bring-text">Real Clydesdales and miniature horses from our own barn. A Clydesdale team pulling a 12-passenger wagon, a Cinderella wagon, an air ride carriage, or a pen of decorated ponies &mdash; or a combination. We bring the right setup for your event size and layout.</p></div>' +

          '<div class="ep-bring-card"><span class="ep-bring-num">03</span><p class="ep-bring-title">Event Photography</p><p class="ep-bring-text">A photographer covers every guest interaction. Not phone snapshots &mdash; real candid-style photography that captures the moments people actually want to share.</p></div>' +
          '<div class="ep-bring-card"><span class="ep-bring-num">04</span><p class="ep-bring-title">Branded Photo Overlays</p><p class="ep-bring-text">Every photo gets a custom overlay with your event name, logo, and date. When guests share on Instagram and Facebook, your event branding goes with them. Free marketing, created by your own attendees.</p></div>' +
          '<div class="ep-bring-card"><span class="ep-bring-num">05</span><p class="ep-bring-title">Same-Day QR Photo Delivery</p><p class="ep-bring-text">Guests scan a QR code on-site and get their individual photos delivered to their phone before they leave. No shared albums, no app downloads, no waiting. This is the part that surprises people &mdash; and it\'s included in every booking.</p></div>' +
          '<div class="ep-bring-card"><span class="ep-bring-num">06</span><p class="ep-bring-title">Full Setup &amp; Teardown</p><p class="ep-bring-text">We arrive early and handle everything: fencing, staging area, signage, animal stations, wagon routes. We clean up after ourselves and leave your site the way we found it.</p></div>' +
        '</div>' +
      '</section>' +

      /* -- EVENT TYPES -- */
      '<section class="ep-types">' +
        '<div class="ep-types-header">' +
          '<p class="ep-types-eyebrow">Who We Work With</p>' +
          '<h2>Events we work.</h2>' +
        '</div>' +
        '<div class="ep-types-grid">' +
          '<div class="ep-type-card"><p class="ep-type-title">Festivals &amp; Fairs</p><p class="ep-type-text">Harvest festivals, county fairs, Fourth of July events, cultural celebrations. We run loop wagon rides and pony interaction pens that keep families on-site longer. The wagon ride line is consistently the longest attraction at the events we work.</p></div>' +
          '<div class="ep-type-card"><p class="ep-type-title">Farmers Markets</p><p class="ep-type-text">Weekly, monthly, or seasonal markets. Ponies and wagon rides draw families who stay, shop, and come back. We\'ve partnered with markets and local businesses across the region.</p></div>' +
          '<div class="ep-type-card"><p class="ep-type-title">Corporate Events</p><p class="ep-type-text">Company picnics, client appreciation, team events, holiday parties. Horses break the ice faster than anything on a team-building agenda. Every guest goes home with branded photos on their phone.</p></div>' +
          '<div class="ep-type-card"><p class="ep-type-title">Holiday Events</p><p class="ep-type-text">Tree lightings, Santa events, winter markets, New Year\'s celebrations. A Clydesdale wagon with string lights pulling through a holiday market is the thing people photograph and post about for weeks.</p></div>' +
          '<div class="ep-type-card"><p class="ep-type-title">Community &amp; Nonprofit Events</p><p class="ep-type-text">Church events, school fundraisers, charity galas, community days. Discounts available for 501(c)(3) organizations and Title I schools.</p><span class="ep-type-note">Nonprofit discounts available</span></div>' +
          '<div class="ep-type-card"><p class="ep-type-title">Grand Openings &amp; Promotions</p><p class="ep-type-text">Nothing stops traffic like a Clydesdale parked out front. We\'ve partnered with local businesses on opening days and promotional events that needed real attention &mdash; not just a sandwich board.</p></div>' +
        '</div>' +
      '</section>' +

      /* -- WHY REBOOK -- */
      '<section class="ep-rebook">' +
        '<div class="ep-rebook-header"><h2>Why organizers come back year after year.</h2></div>' +
        '<div class="ep-rebook-grid">' +
          '<div class="ep-rebook-card"><p class="ep-rebook-title">Longer dwell time.</p><p class="ep-rebook-text">Families who come for the horses stay for the rest of your event. Wagon rides create a reason to wait, walk the grounds, and spend money at other vendors while they\'re in line. Market managers and festival directors tell us the horse attractions are the thing that keeps people from doing a lap and leaving.</p></div>' +
          '<div class="ep-rebook-card"><p class="ep-rebook-title">Social media content you didn\'t have to create.</p><p class="ep-rebook-text">Every guest gets branded photos delivered to their phone same-day. They share them &mdash; on Instagram, Facebook, in group texts &mdash; with your event name and logo on every image. You get organic reach from your own attendees, without paying for ads or hiring a social media team.</p></div>' +
          '<div class="ep-rebook-card"><p class="ep-rebook-title">Zero vendor management.</p><p class="ep-rebook-text">We are not a vendor who needs a tent, a table, power, or volunteers. We bring our own setup, manage our own animals, and clean up when we\'re done. You don\'t assign us help. You don\'t check on us during the event. We show up ready and handle our entire operation.</p></div>' +
          '<div class="ep-rebook-card"><p class="ep-rebook-title">A booking that justifies itself.</p><p class="ep-rebook-text">Horses are the thing people remember. When your board asks what drew the crowd, when your sponsor asks what got posted online, when your vendors ask what kept foot traffic up &mdash; this is your answer.</p></div>' +
        '</div>' +
      '</section>' +

      /* -- TESTIMONIALS -- */
      '<section class="ep-testimonials">' +
        '<div class="ep-testimonials-header"><h2>From the organizers who booked us.</h2></div>' +
        '<div class="ep-testimonials-grid">' +
          '<div class="ep-testimonial"><span class="ep-testimonial-mark">&ldquo;</span><p class="ep-testimonial-text">You guys were awesome! Thank you for helping us make a little magic in our town.</p><p class="ep-testimonial-source">The Donut House &mdash; Local Business Event</p></div>' +
          '<div class="ep-testimonial"><span class="ep-testimonial-mark">&ldquo;</span><p class="ep-testimonial-text">A huge thanks to Tribal Cowboy Photography for partnering up and being available to take some special photos for everyone.</p><p class="ep-testimonial-source">South Boundary Fire Protection District &mdash; Holiday Festival</p></div>' +
          '<div class="ep-testimonial"><span class="ep-testimonial-mark">&ldquo;</span><p class="ep-testimonial-text">The kids loved learning about ducklings, chicks, goslings from Tribal Cowboy. Thank you Stacie for all the love and kindness!</p><p class="ep-testimonial-source">Smart Start Learning Academy</p></div>' +
          '<div class="ep-testimonial"><span class="ep-testimonial-mark">&ldquo;</span><p class="ep-testimonial-text">Thank you for bringing these beautiful ponies! Today was magical!</p><p class="ep-testimonial-source">Make It Messy CDA &mdash; Event Partner</p></div>' +
          '<div class="ep-testimonial"><span class="ep-testimonial-mark">&ldquo;</span><p class="ep-testimonial-text">We love what you do.</p><p class="ep-testimonial-source">Kona Ice of Coeur d\'Alene &mdash; Fellow Event Vendor</p></div>' +
        '</div>' +
      '</section>' +

      /* -- HOW IT WORKS -- */
      '<section class="ep-how">' +
        '<div class="ep-how-header"><h2>How it works.</h2></div>' +
        '<div class="ep-steps">' +
          '<div class="ep-step"><div class="ep-step-dot">1</div><p class="ep-step-title">Tell Us About Your Event</p><p class="ep-step-text">Email or contact us with your event date, location, expected attendance, and what you\'re looking for &mdash; wagon rides, pony interactions, carriage rides, or a combination.</p></div>' +
          '<div class="ep-step"><div class="ep-step-dot">2</div><p class="ep-step-title">Get a Custom Quote</p><p class="ep-step-text">We\'ll respond within one business day with availability, a recommended setup based on your event layout and audience, and clear pricing. No back-and-forth.</p></div>' +
          '<div class="ep-step"><div class="ep-step-dot">3</div><p class="ep-step-title">We Handle the Rest</p><p class="ep-step-text">Our team manages every detail &mdash; transport, setup, animal management, photography, crowd flow, teardown. We arrive early and stay until the job is done.</p></div>' +
          '<div class="ep-step"><div class="ep-step-dot">4</div><p class="ep-step-title">Guests Leave with Photos</p><p class="ep-step-text">Every attendee who interacts with our animals gets branded photos delivered same-day via QR code. Your event name on every image they share.</p></div>' +
        '</div>' +
      '</section>' +

      /* -- ABOUT -- */
      '<section style="background:#2C2520;padding:100px 60px;">' +
        '<div class="ep-about">' +
          '<div class="ep-about-img"><img src="' + ABOUT + '" alt="Tribal Cowboy owner Stacie Huffhines with horses in North Idaho" loading="lazy"></div>' +
          '<div class="ep-about-copy">' +
            '<p class="ep-about-eyebrow">Who We Are</p>' +
            '<h2>Not a franchise.<br>Not a rental company.</h2>' +
            '<p class="ep-about-text">Tribal Cowboy is an Indigenous-owned (Nisenan Maidu) equine experience business based in Athol, Idaho. Owner Stacie Huffhines personally manages every event with her own herd &mdash; Clydesdales, miniature horses, and ponies she has raised and trained.</p>' +
            '<p class="ep-about-text">When you book Tribal Cowboy, you get the owner, the animals, the handlers, and the full-service operation. Every booking helps build toward a permanent ranch providing equine access for people with Down syndrome.</p>' +
            '<p class="ep-about-text">We serve the full North Idaho and Eastern Washington region: Coeur d\'Alene, Post Falls, Hayden, Rathdrum, Spirit Lake, Spokane, Spokane Valley, and beyond.</p>' +
            '<a href="/about" class="ep-about-link">Read the full story &rarr;</a>' +
          '</div>' +
        '</div>' +
      '</section>' +

      /* -- ONE-SHEET -- */
      '<div class="ep-onesheet">' +
        '<div class="ep-onesheet-copy">' +
          '<p class="ep-onesheet-eyebrow">For Your Board &amp; Committee</p>' +
          '<h2>Share with your team.</h2>' +
          '<p class="ep-onesheet-text">Need to present this to your board, committee, or event team? Our one-sheet covers services, photos, and contact info on a single page. Print it or forward it &mdash; everything they need to say yes is right there.</p>' +
        '</div>' +
        '<div class="ep-onesheet-action">' +
          '<a href="' + PDF_URL + '" target="_blank" class="ep-btn-onesheet">Download Event One-Sheet</a>' +
        '</div>' +
      '</div>' +

      /* -- FINAL CTA -- */
      '<section class="ep-cta">' +
        '<p class="ep-cta-eyebrow">Ready to Book</p>' +
        '<h2>Let\'s talk about<br>your event.</h2>' +
        '<p class="ep-cta-body">Tell us your date, location, expected attendance, and what you\'re looking for. We\'ll get back to you within one business day with a custom quote and setup recommendation.</p>' +
        '<div class="ep-cta-btns">' +
          '<a href="/contact" class="ep-btn-dark">Tell Us About Your Event</a>' +
          '<a href="' + PRICING_PDF + '" target="_blank" class="ep-btn-gold">Download Pricing Guide (PDF)</a>' +
          '<a href="tel:+12082612092" class="ep-btn-outline">Call (208) 261-2092</a>' +
        '</div>' +
        '<p class="ep-cta-footnote">Indigenous Owned &middot; Nisenan Maidu &middot; Athol, Idaho</p>' +
      '</section>';

    var hero = wrap.querySelector('.ep-hero');
    if (hero) hero.style.backgroundImage = "url('" + HERO + "')";

    page.insertBefore(wrap, page.firstChild);

    /* -- COLOR FORCING -- */

    wrap.querySelector('.ep-hero h1').style.setProperty('color', '#F3EDE3', 'important');
    wrap.querySelector('.ep-hero-sub').style.setProperty('color', 'rgba(243,237,227,0.88)', 'important');

    wrap.querySelectorAll('.ep-outcome-stat').forEach(function(el) { el.style.setProperty('color', '#D4A843', 'important'); });
    wrap.querySelectorAll('.ep-outcome-label').forEach(function(el) { el.style.setProperty('color', 'rgba(243,237,227,0.65)', 'important'); });

    wrap.querySelector('.ep-brings-header h2').style.setProperty('color', '#2C2520', 'important');
    wrap.querySelectorAll('.ep-bring-num').forEach(function(el) { el.style.setProperty('color', '#D4A843', 'important'); });
    wrap.querySelectorAll('.ep-bring-title').forEach(function(el) { el.style.setProperty('color', '#2C2520', 'important'); el.style.setProperty('font-family', "'Cormorant Garamond', serif", 'important'); });
    wrap.querySelectorAll('.ep-bring-text').forEach(function(el) { el.style.setProperty('color', '#8A7868', 'important'); });

    wrap.querySelector('.ep-types-eyebrow').style.setProperty('color', '#D4A843', 'important');
    wrap.querySelector('.ep-types-header h2').style.setProperty('color', '#F3EDE3', 'important');
    wrap.querySelectorAll('.ep-type-title').forEach(function(el) { el.style.setProperty('color', '#F3EDE3', 'important'); el.style.setProperty('font-family', "'Cormorant Garamond', serif", 'important'); });
    wrap.querySelectorAll('.ep-type-text').forEach(function(el) { el.style.setProperty('color', 'rgba(243,237,227,0.58)', 'important'); });
    wrap.querySelectorAll('.ep-type-note').forEach(function(el) { el.style.setProperty('color', '#D4A843', 'important'); });

    wrap.querySelector('.ep-rebook-header h2').style.setProperty('color', '#2C2520', 'important');
    wrap.querySelectorAll('.ep-rebook-title').forEach(function(el) { el.style.setProperty('color', '#2C2520', 'important'); el.style.setProperty('font-family', "'Cormorant Garamond', serif", 'important'); });
    wrap.querySelectorAll('.ep-rebook-text').forEach(function(el) { el.style.setProperty('color', '#8A7868', 'important'); });

    wrap.querySelector('.ep-testimonials-header h2').style.setProperty('color', '#F3EDE3', 'important');
    wrap.querySelectorAll('.ep-testimonial-mark').forEach(function(el) { el.style.setProperty('color', '#D4A843', 'important'); });
    wrap.querySelectorAll('.ep-testimonial-text').forEach(function(el) { el.style.setProperty('color', 'rgba(243,237,227,0.82)', 'important'); });
    wrap.querySelectorAll('.ep-testimonial-source').forEach(function(el) { el.style.setProperty('color', '#D4A843', 'important'); });

    wrap.querySelector('.ep-how-header h2').style.setProperty('color', '#2C2520', 'important');
    wrap.querySelectorAll('.ep-step-dot').forEach(function(el) { el.style.setProperty('color', '#D4A843', 'important'); });
    wrap.querySelectorAll('.ep-step-title').forEach(function(el) { el.style.setProperty('color', '#2C2520', 'important'); });
    wrap.querySelectorAll('.ep-step-text').forEach(function(el) { el.style.setProperty('color', '#8A7868', 'important'); });

    wrap.querySelector('.ep-about-eyebrow').style.setProperty('color', '#D4A843', 'important');
    wrap.querySelector('.ep-about h2').style.setProperty('color', '#F3EDE3', 'important');
    wrap.querySelectorAll('.ep-about-text').forEach(function(el) { el.style.setProperty('color', 'rgba(243,237,227,0.65)', 'important'); });
    wrap.querySelector('.ep-about-link').style.setProperty('color', '#D4A843', 'important');

    wrap.querySelector('.ep-onesheet-eyebrow').style.setProperty('color', 'rgba(44,37,32,0.55)', 'important');
    wrap.querySelector('.ep-onesheet h2').style.setProperty('color', '#2C2520', 'important');
    wrap.querySelector('.ep-onesheet-text').style.setProperty('color', 'rgba(44,37,32,0.70)', 'important');
    wrap.querySelector('.ep-btn-onesheet').style.setProperty('color', '#F3EDE3', 'important');

    wrap.querySelector('.ep-cta-eyebrow').style.setProperty('color', '#D4A843', 'important');
    wrap.querySelector('.ep-cta h2').style.setProperty('color', '#2C2520', 'important');
    wrap.querySelector('.ep-cta-body').style.setProperty('color', '#8A7868', 'important');
    wrap.querySelector('.ep-cta-footnote').style.setProperty('color', 'rgba(44,37,32,0.28)', 'important');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', buildPage);
  } else {
    buildPage();
  }
})();
</script>
