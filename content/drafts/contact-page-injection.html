      el.style.setProperty('font-family', "'Cormorant Garamond', serif", 'important');
      el.style.setProperty('font-weight', '400', 'important');
    });
    wrap.querySelectorAll('h2').forEach(function(el) {
      el.style.setProperty('font-family', "'Cormorant Garamond', serif", 'important');
      el.style.setProperty('font-weight', '400', 'important');
    });
    var guideH2 = wrap.querySelector('.ct-guide h2');
    if (guideH2) guideH2.style.setProperty('color', '#F3EDE3', 'important');
    wrap.querySelectorAll('.ct-guide-title').forEach(function(el) { el.style.setProperty('color', '#F3EDE3', 'important'); });
    wrap.querySelectorAll('.ct-guide-desc').forEach(function(el) { el.style.setProperty('color', 'rgba(243,237,227,0.55)', 'important'); });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', buildContact);
  } else {
    buildContact();
  }
})();
</script>
