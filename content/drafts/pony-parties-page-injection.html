<script>
(function() {

  var G4    = 'https://images.squarespace-cdn.com/content/675345d03ff97b41f87c5858/c54badc1-e860-4b51-a0f4-914a7ff69244/IMG_0300.jpeg';

  function buildPonyParties() {
    var page = document.getElementById('page');
    if (!page) { setTimeout(buildPonyParties, 120); return; }

      s.style.setProperty('display', 'none', 'important');
    });

    // Build the page
    var wrap = document.createElement('div');
    wrap.id = 'tc-pp';
    wrap.innerHTML =
      /* ── HERO ── */
      '<section class="pp-hero">' +
        '<div class="pp-hero-overlay"></div>' +
        '<div class="pp-hero-content">' +
          '<p class="pp-hero-eyebrow">Pony Parties &mdash; North Idaho</p>' +
          '<h1>Small Horses.<br>Big Reactions.</h1>' +
          '<p class="pp-hero-sub">Real decorated ponies. Instant photo delivery. The kind of birthday your kid describes for years.</p>' +
          '<a href="/contact" class="pp-btn-gold">Check Your Date</a>' +
        '</div>' +
      '</section>' +

      /* ── STATS ── */
      '<div class="pp-stats">' +
        '<div class="pp-stat"><span class="pp-stat-num">Mini</span><span class="pp-stat-label">Ponies</span></div>' +
        '<div class="pp-stat"><span class="pp-stat-num">100%</span><span class="pp-stat-label">Same-Day Photo Delivery</span></div>' +

        '<div class="pp-stat"><span class="pp-stat-num">300+</span><span class="pp-stat-label">Guests</span></div>' +
      '</div>' +

      /* ── INTRO ── */
      '<section class="pp-intro">' +
        '<h2>Ponies that show up dressed for the party.</h2>' +
        '<p>Every pony arrives groomed, decorated, and ready &mdash; flower crowns, ribbons, colored mane extensions. We set up, handle the animals, photograph every guest, and deliver everything before the party is over. You just watch your kid&rsquo;s face when they see a real pony in the backyard.</p>' +
      '</section>' +

      /* ── GALLERY ── */
      '<div class="pp-gallery">' +
        '<div class="pp-gallery-item"><img src="' + G1 + '" alt="Princess birthday pony party" loading="lazy"></div>' +
        '<div class="pp-gallery-item"><img src="' + G2 + '" alt="Decorated pony with pink flower garland" loading="lazy"></div>' +
        '<div class="pp-gallery-item"><img src="' + G3 + '" alt="Unicorn pony party with guests" loading="lazy"></div>' +
        '<div class="pp-gallery-item"><img src="' + G4 + '" alt="Unicorn pony close-up" loading="lazy"></div>' +
      '</div>' +

      /* ── WHAT'S INCLUDED ── */

        '<div class="pp-includes-header">' +
          '<h2>What&rsquo;s included.</h2>' +
          '<p>No surprises, no add-ons. This is what every party gets.</p>' +
        '</div>' +
        '<div class="pp-includes-grid">' +
          '<div class="pp-include-card">' +
            '<p class="pp-include-title">The Ponies</p>' +
            '<p class="pp-include-text">Our mini ponies arrive decorated to match your theme &mdash; flower crowns, ribbons, colored mane extensions. They&rsquo;re calm, kid-tested, and genuinely beautiful. We handle all setup, care, and cleanup throughout the event.</p>' +
          '</div>' +
          '<div class="pp-include-card">' +
            '<p class="pp-include-title">The Photos</p>' +
            '<p class="pp-include-text">We photograph every guest with the ponies &mdash; candid moments, portraits, group shots. Photos are delivered the same day via QR code with a custom branded overlay. Guests scan and download from their phone before they leave.</p>' +
          '</div>' +
          '<div class="pp-include-card">' +
            '<p class="pp-include-title">The Experience</p>' +
            '<p class="pp-include-text">Two-hour events at your location in North Idaho or Eastern Washington. Supervised pony interaction the whole time. We bring everything &mdash; ponies, grooming, photo gear. You get the full setup without lifting a finger.</p>' +
          '</div>' +
        '</div>' +
      '</section>' +

      /* ── TESTIMONIALS ── */
      '<section class="pp-testi">' +
        '<h2>What families are saying.</h2>' +
        '<div class="pp-testi-grid">' +
          '<div class="pp-testi-card">' +
            '<p class="pp-testi-quote">"I asked my kids at dinner who they&rsquo;d trade places with. My 8-year-old said &lsquo;that lady in Coeur d&rsquo;Alene because she let us ride her horses and was nice.&rsquo; They loved it so much they came back the following summer."</p>' +
            '<p class="pp-testi-attr">Joel D. &mdash; Returning Guest</p>' +
          '</div>' +
          '<div class="pp-testi-card">' +
            '<p class="pp-testi-quote">"Tribal Cowboy brought Bullseye today and we are SO HAPPY."</p>' +
            '<p class="pp-testi-attr">Lauren H. &mdash; Birthday Party</p>' +
          '</div>' +

            '<p class="pp-testi-quote">"We love our weekly lessons with Tribal Cowboy. Thank you for giving kids a space to bond with animals."</p>' +

          '</div>' +
        '</div>' +
      '</section>' +

      /* ── FAQ ── */
      '<section class="pp-faq">' +
        '<div class="pp-faq-header"><h2>Common questions.</h2></div>' +
        '<div class="pp-faq-list">' +

          '<div class="pp-faq-item"><div class="pp-faq-question"><p class="pp-faq-q-text">How much space do you need?</p><div class="pp-faq-icon">+</div></div><div class="pp-faq-answer"><div class="pp-faq-answer-inner">A backyard works. We need enough space to safely set up a small fenced pony area &mdash; roughly 20x20 feet minimum, on flat ground with no low overhead obstacles. A driveway, yard, or open parking area all work. When you contact us, mention your setup and we\'ll let you know if it\'s a good fit.</div></div></div>' +

          '<div class="pp-faq-item"><div class="pp-faq-question"><p class="pp-faq-q-text">What happens if it rains?</p><div class="pp-faq-icon">+</div></div><div class="pp-faq-answer"><div class="pp-faq-answer-inner">Light rain we can usually work with &mdash; ponies don\'t mind drizzle, and honestly, kids don\'t either. If conditions become unsafe for the animals or guests (lightning, heavy rain, high wind), we\'ll contact you as soon as possible to reschedule. We don\'t cancel without a conversation first, and we work with you to find a new date.</div></div></div>' +

          '<div class="pp-faq-item"><div class="pp-faq-question"><p class="pp-faq-q-text">How far in advance should I book?</p><div class="pp-faq-icon">+</div></div><div class="pp-faq-answer"><div class="pp-faq-answer-inner">Spring and summer weekends go fast &mdash; sometimes 6-8 weeks out. If you have a specific date in mind, reach out as soon as you know. We\'ll always tell you straight if the date is available or not.</div></div></div>' +

          '<div class="pp-faq-item"><div class="pp-faq-question"><p class="pp-faq-q-text">What ages is this good for?</p><div class="pp-faq-icon">+</div></div><div class="pp-faq-answer"><div class="pp-faq-answer-inner">Pony parties work well for kids 2 and up. The ponies are calm and gentle with young children. We\'ve done parties for toddlers through elementary school age &mdash; and honestly, the parents tend to love it just as much as the kids.</div></div></div>' +

          '<div class="pp-faq-item"><div class="pp-faq-question"><p class="pp-faq-q-text">What if my kid is scared of the horses?</p><div class="pp-faq-icon">+</div></div><div class="pp-faq-answer"><div class="pp-faq-answer-inner">Happens more than you\'d think &mdash; and it almost always resolves within five minutes. Our handlers are patient and experienced with nervous kids. We let them approach at their own speed. Some start by just watching, then petting, then suddenly they don\'t want to leave. No pressure, no rushing.</div></div></div>' +

          '<div class="pp-faq-item"><div class="pp-faq-question"><p class="pp-faq-q-text">Do you travel outside North Idaho?</p><div class="pp-faq-icon">+</div></div><div class="pp-faq-answer"><div class="pp-faq-answer-inner">We\'re based in Athol and serve North Idaho and Eastern Washington &mdash; Coeur d\'Alene, Post Falls, Hayden, Rathdrum, Spirit Lake, Spokane, Spokane Valley. Further travel is possible; fees apply. Just ask.</div></div></div>' +

        '</div>' +
      '</section>' +

      /* ── CTA ── */
      '<section class="pp-cta">' +
        '<h2>Your kid\'s going to talk about this one for a while.</h2>' +
        '<p>Summer and fall book fast. Tell us your date and headcount, and we\'ll get back to you within one business day.</p>' +
        '<div class="pp-cta-actions">' +
          '<a href="/contact" class="pp-btn-gold">Check Your Date</a>' +
          '<a href="tel:+12082612092" class="pp-btn-outline">Call (208) 261-2092</a>' +
        '</div>' +
      '</section>';

    var hero = wrap.querySelector('.pp-hero');

    page.insertBefore(wrap, page.firstChild);

        el.querySelector('.pp-faq-answer').style.maxHeight = '0';

        item.classList.add('open');
        answer.style.maxHeight = answer.scrollHeight + 'px';
      }
    });

    wrap.querySelectorAll('h1, h2').forEach(function(el) {

})();
</script>
