          '<h2>This started with a boy, a horse, and a dream.</h2>' +
          '<p class="hm-mission-text">Tribal Cowboy exists because of Billy &mdash; Stacie\'s older brother, who had Down syndrome. He passed away in March 2025, a week before his birthday. The dream he inspired is still the same: build a permanent ranch where people like Billy can ride, drive, and connect with horses in a place that\'s theirs.</p>' +
