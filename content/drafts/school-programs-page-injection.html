          '<div class="sc-step"><p class="sc-step-num">1</p><p class="sc-step-title">Get in Touch</p><p class="sc-step-text">Tell us your group size, age range, and what you&rsquo;re hoping to cover. We&rsquo;ll take it from there.</p></div>' +
          '<div class="sc-step"><p class="sc-step-num">2</p><p class="sc-step-title">Design the Program</p><p class="sc-step-text">We customize a format that fits your curriculum, budget, and venue. Every group is different.</p></div>' +
          '<div class="sc-step"><p class="sc-step-num">3</p><p class="sc-step-title">We Show Up</p><p class="sc-step-text">We arrive with the animals, equipment, and everything needed. You don&rsquo;t lift a finger.</p></div>' +
          '<div class="sc-step"><p class="sc-step-num">4</p><p class="sc-step-title">Students Learn</p><p class="sc-step-text">Real horses, real interaction, real questions. The kind of day kids actually remember.</p></div>' +
        '</div>' +
      '</section>' +

      /* -- PRICING -- */
      '<section class="sc-pricing">' +
        '<h2>Program pricing.</h2>' +
        '<p class="sc-pricing-sub">Starting prices for standard programs. Final cost depends on group size, location, and curriculum scope.</p>' +
        '<div class="sc-pricing-grid">' +
          '<div class="sc-price-card">' +
            '<p class="sc-price-label">Half-Day Program</p>' +
            '<p class="sc-price-amount">$350</p>' +
            '<p class="sc-price-duration">Starting at &mdash; 2 to 3 hours</p>' +
            '<p class="sc-price-desc">Includes instruction, professional photos with QR code delivery, and Q&amp;A with Stacie. Good for a single class or small group. Final cost based on group size and location.</p>' +
            '<a href="/contact" class="sc-price-link">Get a Quote</a>' +
          '</div>' +
          '<div class="sc-price-card">' +
            '<p class="sc-price-label">Full-Day Program</p>' +
            '<p class="sc-price-amount">$600</p>' +
            '<p class="sc-price-duration">Starting at &mdash; 4 to 5 hours</p>' +
            '<p class="sc-price-desc">Extended time for deeper learning. Includes grooming, riding (if appropriate), wagon rides, and cultural components. Best for large groups with multiple class rotations.</p>' +
            '<a href="/contact" class="sc-price-link">Get a Quote</a>' +
          '</div>' +
          '<div class="sc-price-card">' +
            '<p class="sc-price-label">Multi-Day / Large Group</p>' +
            '<p class="sc-price-amount">$900</p>' +
            '<p class="sc-price-duration">Starting at &mdash; Groups 40+ or multi-day</p>' +
            '<p class="sc-price-desc">Multiple stations, deeper skill-building, longer experience. Best for field days, camp programs, or special events. Contact us with your project details for an accurate quote.</p>' +
            '<a href="/contact" class="sc-price-link">Get a Quote</a>' +
          '</div>' +
        '</div>' +
        '<p class="sc-pricing-note">Whether you&rsquo;re a school, nonprofit, or community organization, we&rsquo;re here to create an experience your group will remember.</p>' +
        '<p class="sc-discount-note">Nonprofit &amp; Title I School Discounts Available &mdash; We believe in making these experiences accessible. Ask about pricing support when you reach out.</p>' +

        '<h2>What teachers are saying.</h2>' +
        '<div class="sc-testi-grid">' +
          '<div class="sc-testi-card">' +
            '<p class="sc-testi-quote">"My students haven&rsquo;t stopped talking about it. We&rsquo;ve done a lot of field trips, but nothing hits the same as a real animal encounter led by someone who actually knows what they&rsquo;re talking about."</p>' +
            '<p class="sc-testi-attr">4th Grade Teacher &mdash; North Idaho</p>' +
          '</div>' +
          '<div class="sc-testi-card">' +
            '<p class="sc-testi-quote">"Having Stacie share the Nisenan Maidu perspective on the relationship between Indigenous people and horses was something I couldn&rsquo;t have taught from a textbook. My students asked questions I didn&rsquo;t even know to ask."</p>' +

          '</div>' +
          '<div class="sc-testi-card">' +
            '<p class="sc-testi-quote">"We brought Tribal Cowboy in for our school program and it completely transformed the energy of the day. Kids who were disengaged were suddenly asking how to brush a horse."</p>' +

          '</div>' +
        '</div>' +
      '</section>' +

      /* -- FAQ -- */
      '<section class="sc-faq">' +
        '<h2>Frequently asked questions.</h2>' +
        '<div class="sc-faq-list">' +

          '<div class="sc-faq-item">' +
            '<div class="sc-faq-q">What age groups are your programs designed for?<span class="sc-faq-icon">+</span></div>' +
            '<div class="sc-faq-a"><p>We&rsquo;ve worked with students from preschool through high school. Younger kids (K&ndash;3) focus on calm interaction &mdash; meeting the animals, basic grooming, asking questions. Older students can go deeper: horse anatomy, groundwork, and the cultural and historical context of horses in Indigenous life. Tell us your grade level and we&rsquo;ll tailor accordingly.</p></div>' +
          '</div>' +

          '<div class="sc-faq-item">' +
            '<div class="sc-faq-q">Do you come to us, or do we come to your property?<span class="sc-faq-icon">+</span></div>' +
            '<div class="sc-faq-a"><p>We come to you. We&rsquo;ve brought horses to school parking lots, fairgrounds, open fields, and community parks. You need a flat outdoor space with enough room to safely contain the animals and move a group around. When you reach out, share your location and we&rsquo;ll confirm if it works.</p></div>' +
          '</div>' +

          '<div class="sc-faq-item">' +
            '<div class="sc-faq-q">What if students are afraid of the horses?<span class="sc-faq-icon">+</span></div>' +
            '<div class="sc-faq-a"><p>Expected, and never a problem. We start every program with the animals calm and settled before students arrive. Kids who are nervous can watch from a distance and approach at their own pace. In years of programs, the reluctant ones are usually the most engaged by the end.</p></div>' +
          '</div>' +

          '<div class="sc-faq-item">' +
            '<div class="sc-faq-q">Do students get to ride?<span class="sc-faq-icon">+</span></div>' +
            '<div class="sc-faq-a"><p>Riding is available on select programs depending on age, group size, insurance requirements, and venue. Most school programs focus on ground-based interaction &mdash; grooming, leading, handling, and learning. If riding is a priority for your program, mention it when you contact us and we&rsquo;ll see what&rsquo;s possible.</p></div>' +
          '</div>' +

          '<div class="sc-faq-item">' +
            '<div class="sc-faq-q">Do you take photos during the program?<span class="sc-faq-icon">+</span></div>' +
            '<div class="sc-faq-a"><p>Yes &mdash; every program includes professional photos of students with the animals, delivered via QR code with a branded overlay. Teachers and administrators have used these for newsletters, classroom walls, and grant reports. Parents love them.</p></div>' +
          '</div>' +

          '<div class="sc-faq-item">' +
            '<div class="sc-faq-q">How far in advance should we book?<span class="sc-faq-icon">+</span></div>' +

          '</div>' +

        '</div>' +
      '</section>' +

        '<h2>The kind of field trip they actually remember.</h2>' +
        '<p>Tell us your group size, grade level, and what you have in mind. We book programs year-round and offer discounts for Title I schools and 501(c)(3) nonprofits.</p>' +

        }
